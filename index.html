<!DOCTYPE html>
<html>
<body>

<h2>LIVE SCORE</h2>
<div id="score">Loading...</div>

<script>
const API_KEY = "YOUR_API_KEY";

fetch(`https://api.cricketdata.org/v1/currentMatches?apikey=${API_KEY}`)
.then(res => res.json())
.then(data => {
    console.log(data);

    // example safe output
    if (data && data.data && data.data.length > 0) {
        const match = data.data[0];
        document.getElementById("score").innerText =
            `${match.name} | ${match.status}`;
    } else {
        document.getElementById("score").innerText = "No live match";
    }
})
.catch(err => {
    document.getElementById("score").innerText = "Error loading score";
});
</script>

</body>
</html>
