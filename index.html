<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Cricket Score</title>
<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    width:300px;
    margin:auto;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{
    color:#38bdf8;
}

#status{
    margin-top:10px;
    font-size:14px;
    color:#a5b4fc;
}
</style>
</head>

<body>

<h2>🏏 LIVE SCORE</h2>

<div class="card">
    <div id="match">Loading match...</div>
    <div id="status">Please wait</div>
</div>

<script>
const API_KEY = "f9884b26-475d-4d10-80d4-d0d4a2c17e6d";

// 👉 তোমার endpoint এখানে বসাবে
const API_URL = "https://api.cricketdata.org/v1/currentMatches";

async function loadScore(){
    try{
        const res = await fetch(API_URL + "?apikey=" + API_KEY);
        const data = await res.json();

        console.log(data);

        // safe checking (undefined problem fix)
        const match = data?.data?.[0];

        if(match){
            document.getElementById("match").innerHTML =
                `<b>${match.name || "Match"}</b><br>${match.status || "No status"}`;
        } else {
            document.getElementById("match").innerText = "No live match found";
        }

        document.getElementById("status").innerText = "Updated successfully";

    } catch(err){
        console.log(err);
        document.getElementById("match").innerText = "Error loading data";
        document.getElementById("status").innerText = "API error";
    }
}

// first load
loadScore();

// auto refresh every 10 seconds
setInterval(loadScore, 10000);
</script>

</body>
</html>
