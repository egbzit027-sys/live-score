<script>
async function getScore() {
  try {
    let res = await fetch("https://api.cricapi.com/v1/cricScore?apikey=f9884b26-475d-4d10-80d4-d0d4a2c17e6d
");
    let data = await res.json();

    if(data.data && data.data.length > 0){
      let match = data.data[0];

      let scoreText = "No score yet";

      if(match.score && match.score.length > 0){
        scoreText = match.score.map(s => 
          s.inning + ": " + s.r + "/" + s.w + " (" + s.o + ")"
        ).join("<br>");
      }

      document.getElementById("score").innerHTML =
        match.t1 + " vs " + match.t2 + "<br><br>" +
        scoreText + "<br><br>" +
        match.status;

    } else {
      document.getElementById("score").innerHTML = "No Live Match";
    }

  } catch(e){
    document.getElementById("score").innerHTML = "Error loading score";
  }
}

setInterval(getScore, 5000);
getScore();
</script>
